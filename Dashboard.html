<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Dashboard</title>

    <link rel="stylesheet" href="./main.css"  >

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>
 <!------------------- INPUTS ------------------->
 
 

   <div class="container py-3">

    <div class="row mb-5 border-2 border-bottom border-secondary  d-flex align-items-center">

      <div class="col-md-4 col-sm-3">
            <img src="./undraw_groceries_4via.png" class="custom-img  ">
      </div>

    <div id="welcome" class="col-md-4 col-sm-6 text-center ">  </div>

    <div id="logout" class=" col-md-4 col-sm-3 text-end  ">
      <!-- <button class="btn btn-outline-danger dropdown" onclick="logout()">Logout</button> -->
       <div class="dropdown">
  <button class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">More</button>
  <ul class="dropdown-menu dropdown-menu-light">
    <li><button class="btn" onclick="logout()">Logout</button></li>
  </ul>
</div>
    </div>

   </div>

    <!-- <h4 class="text-success text-center">Store Your Products Easily..</h4> -->
<div class="container py-3 ">
    <label for="pn"> Product Name </label>
    <input id="pn" type="text" class="form-control mb-3" >

    <label for="pp"> Product Price </label>
    <input id="pp" type="number" class="form-control mb-3" >

    <label for="pc"> Product Category </label>
    <input id="pc" type="text" class="form-control mb-3" >

    <label for="pd"> Product description </label>
    <input id="pd" type="text" class="form-control mb-3" >

    <div id="convertAddToEdit">
      <button  onclick="addProduct()" class="btn btn-outline-success me-2 ">Add</button>
    </div>

    <h1 id="alert" class="text-center text-danger">  </h1>

    <input id="search" onkeyup="search()" placeholder="Search by Product name..." type="text "  class="form-control mt-3">
    <h1 id="alert2" class="text-center text-danger">  </h1>
   </div>

   <!------------------- DATA ------------------->
   <div class="container py-3 ">
  <div class="table-responsive">
    <table class="table table-striped table-bordered text-center align-middle">
      <thead class="table-dark">
        <tr>
          <th>#</th>
          <th>Product Name</th>
          <th>Product Price</th>
          <th>Product Category</th>
          <th>Product Description</th>
          <th>Edit</th>
          <th>Delete</th>
        </tr>
      </thead>

      <tbody id="tr">
        <!-- rows from JS -->
      </tbody>
    </table>
  </div>
</div>

   </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="./Dashboard.js"></script>
    <script src="./main.js"></script>
</body>
</html>
