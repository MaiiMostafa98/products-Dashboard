<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Dashboard</title>

    <link href="./main.css" rel="stylesheet" >

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>
 <!------------------- INPUTS ------------------->
 
 

   <div class="py-3 m-auto w-75">

      <div class="row mb-5 border-2 border-bottom border-secondary pb-2">
    <div id="welcome" class="col-md-6 ">
    <!-- <h4>-Welcome <span class="text-danger">Maii Mostafa</span>-</h4> -->

       <!-- <script>
         var user = JSON.parse(localStorage.getItem("currentUser"));

         if(user){ document.getElementById('welcome').innerHTML =
         `<h4>-Welcome <span class="text-danger"> ${user.firstName} ${user.lastName}</span>-</h4>` ; }
      </script>
      -->
   </div>

   <div id="logout" class=" col-md-6 text-end  ">
    <button class="btn btn-outline-danger" onclick="logout()">Logout</button>
   </div>
   </div>

    <label for="pn"> Product Name </label>
    <input id="pn" type="text" class="form-control mb-3" >

    <label for="pp"> Product Price </label>
    <input id="pp" type="number" class="form-control mb-3" >

    <label for="pc"> Product Category </label>
    <input id="pc" type="text" class="form-control mb-3" >

    <label for="pd"> Product Describtion </label>
    <input id="pd" type="text" class="form-control mb-3" >

    <div id="convertAddToEdit">
      <button  onclick="addProduct()" class="btn btn-outline-success me-2 ">Add</button>
    </div>

    <h1 id="alert" class="text-center text-danger">  </h1>

    <input id="search" onkeyup="search()" placeholder="Search by Product name..." type="text "  class="form-control mt-3">
    <h1 id="alert2" class="text-center text-danger">  </h1>
   </div>

   <!------------------- DATA ------------------->
   <div class="py-5 m-auto w-75">
    <table class="table">
  <thead>
    <tr>
      <th scope="col">#</th>
      <th scope="col">Product Name</th>
      <th scope="col">Product Price</th>
      <th scope="col">Product Category</th>
      <th scope="col">Product Describtion</th>
      <th scope="col" > Edit </th>
      <th scope="col" > Delete </th>
    </tr>
  </thead>
  <tbody id="tr">
  
</table>

   </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="./Dashboard.js"></script>
    <script src="../main.js"></script>
</body>
</html>
